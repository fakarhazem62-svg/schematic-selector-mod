name: Build Mod

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - mc: "1.20.6"
            yarn: "1.20.6+build.3"
            loader: "0.15.11"
            fabric_api: "0.99.2+1.20.6"
          - mc: "1.21.1"
            yarn: "1.21.1+build.3"
            loader: "0.16.9"
            fabric_api: "0.102.0+1.21.1"
          - mc: "1.21.4"
            yarn: "1.21.4+build.8"
            loader: "0.16.9"
            fabric_api: "0.110.0+1.21.4"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.8"

      - name: Build for MC ${{ matrix.mc }}
        run: gradle build -Pminecraft_version=${{ matrix.mc }} -Pyarn_mappings=${{ matrix.yarn }} -Ploader_version=${{ matrix.loader }} -Pfabric_version=${{ matrix.fabric_api }}

      - name: Upload JAR ${{ matrix.mc }}
        uses: actions/upload-artifact@v4
        with:
          name: schematic-selector-mod-${{ matrix.mc }}
          path: build/libs/schematic-selector-*.jar
          if-no-files-found: error